apiVersion: apps/v1
kind: Deployment
metadata:
  name: apogee-server
  namespace: apogee
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apogee-server
  template:
    metadata:
      labels:
        app: apogee-server
    spec:
      containers:
        - name: apogee-server
          image: apogee:demo
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: postgresql://apogee:apogee_dev@postgres:5432/apogee_dev
            - name: REDIS_URL
              value: redis://redis:6379
            - name: PORT
              value: "3000"
            - name: HOST
              value: 0.0.0.0
            - name: NODE_ENV
              value: development
            - name: LOG_LEVEL
              value: info
            - name: APP_JWT_SECRET
              value: ""
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: apogee-server
  namespace: apogee
spec:
  type: NodePort
  selector:
    app: apogee-server
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
