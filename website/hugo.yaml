baseURL: https://apogee-erp.github.io/apogee/
languageCode: en-us
title: Apogee ERP

module:
  imports:
    - path: github.com/imfing/hextra

enableRobotsTXT: true
enableGitInfo: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: Entity Catalog
      pageRef: /docs/entities
      weight: 2
    - name: API Reference
      pageRef: /docs/api
      weight: 3
    - name: GitHub ↗
      url: https://github.com/apogee-erp/apogee
      weight: 4

params:
  description: Open-source ERP for international satellite operators
  navbar:
    displayTitle: true
    displayLogo: false
  page:
    width: wide
  footer:
    displayCopyright: true
    displayPoweredBy: false
  editURL:
    enable: true
    base: https://github.com/apogee-erp/apogee/edit/master/website/content
