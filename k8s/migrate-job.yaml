apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: apogee
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: apogee-migrate:demo
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: postgresql://apogee:apogee_dev@postgres:5432/apogee_dev
