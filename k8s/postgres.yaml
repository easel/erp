apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: apogee
data:
  POSTGRES_USER: apogee
  POSTGRES_PASSWORD: apogee_dev
  POSTGRES_DB: apogee_dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: apogee
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - configMapRef:
                name: postgres-config
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - apogee
                - -d
                - apogee_dev
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: apogee
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
