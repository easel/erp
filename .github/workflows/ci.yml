name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci-bun:
    name: CI (Bun primary)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: apogee
          POSTGRES_PASSWORD: apogee
          POSTGRES_DB: apogee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apogee"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://apogee:apogee@localhost:5432/apogee_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck (tsc)
        run: bun run typecheck

      - name: Test (bun test)
        run: bun test

  ci-node:
    # Validates Node.js runtime compatibility per ADR-009.
    # packages/shared tests use vitest (runtime-agnostic) so they can execute
    # under Node.js LTS without any Bun-only dependencies.
    #
    # What this job validates on Node.js LTS:
    #   - Biome lint/format (invoked via Bun CLI, but checks source portability)
    #   - TypeScript type-checking (tsc runs on Node.js via npx)
    #   - packages/shared test suite via vitest under Node.js (ADR-009 dual-runtime requirement)
    name: CI (Node.js LTS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck (tsc)
        run: bun run typecheck

      - name: Test shared package (vitest — Node.js runtime)
        run: cd packages/shared && node --version && npx vitest run
