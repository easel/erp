services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apogee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apogee_dev}
      POSTGRES_DB: ${POSTGRES_DB:-apogee_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apogee} -d ${POSTGRES_DB:-apogee_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    working_dir: /app
    volumes:
      - ./packages/server/migrations:/app/migrations:ro
      - ./packages/server/.gmrc:/app/.gmrc:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-apogee}:${POSTGRES_PASSWORD:-apogee_dev}@postgres:5432/${POSTGRES_DB:-apogee_dev}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # Keycloak — OIDC identity provider for local dev.
  # Provides JWT tokens that the Apogee server validates on protected routes.
  # Access the admin console at http://localhost:8080 (admin / admin_dev).
  # Realm setup: create realm "apogee", client "apogee-api" (confidential),
  # then set OIDC_ISSUER_URL and APP_JWT_SECRET in .env.
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev}
      KC_DB: dev-mem
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # Redis is optional per ADR-008. The system functions without it:
  # sessions fall back to PostgreSQL, rate limiting falls back to in-memory.
  # Redis is recommended for multi-instance deployments.
  # To run without Redis: docker compose up postgres migrate
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    command: redis-server --save 60 1 --loglevel warning

volumes:
  postgres_data:
  redis_data:
