name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci-bun:
    name: CI (Bun primary)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: saterp
          POSTGRES_PASSWORD: saterp
          POSTGRES_DB: saterp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saterp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://saterp:saterp@localhost:5432/saterp_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck (tsc)
        run: bun run typecheck

      - name: Test (bun test)
        run: bun test

  ci-node:
    # NOTE: This job validates that lint and typecheck pass using Node.js LTS
    # tooling (npx, tsc). It does NOT execute tests on the Node.js runtime
    # because the test suite imports from 'bun:test' (a Bun-only module) and
    # cannot run under Node.js without a separate test runner.
    #
    # Per ADR-009, shared packages must not use Bun-only APIs in production
    # code; the test-runner import is test-infrastructure only. True Node.js
    # runtime test execution is tracked in a follow-on issue.
    #
    # What this job genuinely validates on Node.js LTS:
    #   - Biome lint/format (invoked via Bun CLI, but checks source portability)
    #   - TypeScript type-checking (tsc runs on Node.js via npx)
    name: CI (Node.js LTS — lint and typecheck only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck (tsc)
        run: bun run typecheck
