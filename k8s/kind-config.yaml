kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: apogee-demo
nodes:
  - role: control-plane
    extraPortMappings:
      # Apogee API server
      - containerPort: 30000
        hostPort: 3100
        protocol: TCP
      # Keycloak
      - containerPort: 30080
        hostPort: 8180
        protocol: TCP
